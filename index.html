<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Science Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">

  <!-- Hero Section -->
  <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white">
    <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <span class="text-3xl font-bold">🧠</span>
        <span class="text-xl font-bold">DataSci Portfolio</span>
      </div>
      <div class="flex space-x-4">
        <a href="https://github.com" target="_blank" class="hover:text-blue-200">GitHub</a>
        <a href="https://linkedin.com" target="_blank" class="hover:text-blue-200">LinkedIn</a>
        <a href="mailto:contact@example.com" class="hover:text-blue-200">Email</a>
      </div>
    </nav>
    <div class="container mx-auto px-6 py-20 text-center">
      <h1 class="text-5xl font-bold mb-4">Data Scientist & ML Engineer</h1>
      <p class="text-xl mb-8">Transforming data into actionable insights through machine learning</p>
      <button class="bg-white text-blue-600 px-6 py-3 rounded-lg font-semibold hover:bg-blue-50 transition-colors">
        View Projects
      </button>
    </div>
  </header>

  <!-- Projects Section -->
  <section class="py-20 container mx-auto px-6">
    <h2 class="text-3xl font-bold mb-12 text-center">Featured Projects</h2>
    <div id="projects" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </section>

  <!-- Skills Section -->
  <section class="bg-gray-100 py-20">
    <div class="container mx-auto px-6">
      <h2 class="text-3xl font-bold mb-12 text-center">Technical Skills</h2>
      <div id="skills" class="grid md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-8">
    <div class="container mx-auto px-6 text-center">
      <p>© 2024 Data Science Portfolio. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
